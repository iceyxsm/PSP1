<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>PSP1 - Layer Manager Pro</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="wrapper">
        <div class="header">
            <h2>PSP1 - Layer Manager Pro</h2>
        </div>
        
        <!-- Layer Selection Section -->
        <div class="section">
            <div class="section-header">
                <label class="section-title">Select Layers</label>
                <button class="btn btn-small" id="refreshLayers">Refresh</button>
            </div>
            <div class="section-content">
                <div class="layer-list" id="layerList">
                    <div class="help-text">Click Refresh to load layers</div>
                </div>
                <div class="button-group">
                    <button class="btn" id="selectAll">Select All</button>
                    <button class="btn" id="deselectAll">Deselect All</button>
                </div>
            </div>
        </div>
        
        <!-- Group Actions -->
        <div class="section">
            <div class="section-header">
                <label class="section-title">Group Actions</label>
            </div>
            <div class="section-content">
                <input type="text" class="text-input" id="groupNameInput" placeholder="Auto-generate if empty">
                <div class="button-group">
                    <button class="btn btn-primary" id="createGroup">Create Group</button>
                    <button class="btn" id="smartAutoGroup">Smart Auto-Group</button>
                </div>
            </div>
        </div>
        
        <!-- Bulk Styling -->
        <div class="section">
            <div class="section-header">
                <label class="section-title">Bulk Styling</label>
            </div>
            <div class="section-content">
                <!-- Text Color -->
                <div class="color-section">
                    <label class="color-label">Text Color</label>
                    <div class="color-picker-container">
                        <input type="color" class="color-wheel" id="textColorWheel" value="#000000">
                        <div class="color-display" id="textColorDisplay"></div>
                        <input type="text" class="hex-input" id="textColorHex" value="#000000" placeholder="#000000">
                    </div>
                    <button class="btn btn-compact" id="applyTextColor">Apply</button>
                </div>
                
                <!-- Shape Color -->
                <div class="color-section">
                    <label class="color-label">Shape Color</label>
                    <div class="color-picker-container">
                        <input type="color" class="color-wheel" id="shapeColorWheel" value="#ff0000">
                        <div class="color-display" id="shapeColorDisplay"></div>
                        <input type="text" class="hex-input" id="shapeColorHex" value="#ff0000" placeholder="#ff0000">
                    </div>
                    <button class="btn btn-compact" id="applyShapeColor">Apply</button>
                </div>
                
                <!-- Font Selection -->
                <div class="font-section">
                    <label class="color-label">Font</label>
                    <div class="font-controls">
                        <select class="select-input" id="fontSelect">
                            <option value="">Select Font...</option>
                            <option value="Arial">Arial</option>
                            <option value="Helvetica">Helvetica</option>
                            <option value="Times New Roman">Times New Roman</option>
                            <option value="Courier New">Courier New</option>
                            <option value="Georgia">Georgia</option>
                        </select>
                        <button class="btn btn-compact" id="applyFont">Apply</button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Group Management -->
        <div class="section">
            <div class="section-header">
                <label class="section-title">Group Management</label>
            </div>
            <div class="section-content">
                <div class="button-group">
                    <button class="btn" id="toggleVisibility">Toggle Visibility</button>
                    <button class="btn" id="replaceImage">Replace Image</button>
                </div>
                <div class="button-group">
                    <button class="btn" id="showAll">Show All</button>
                    <button class="btn" id="hideAll">Hide All</button>
                </div>
            </div>
        </div>
        
        <!-- Progress and Status -->
        <div class="progress" id="progress">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        
        <div class="status" id="status"></div>
    </div>
    
    <script src="index.js"></script>
</body>
</html>
