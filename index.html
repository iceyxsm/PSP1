<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>PSP1 - Simple Grouper</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>PSP1 - Simple Grouper</h1>
        
        <!-- Layer List -->
        <div class="section">
            <h2>Layers</h2>
            <button id="refreshLayers" class="btn">Refresh Layers</button>
            <div id="layerList" class="layer-list">
                <p>Click Refresh to load layers</p>
            </div>
        </div>
        
        <!-- Group Creation -->
        <div class="section">
            <h2>Create Group</h2>
            <input type="text" id="groupName" placeholder="Group name (optional)" class="input">
            <button id="createGroup" class="btn btn-primary">Create Group</button>
        </div>
        
        <!-- Status -->
        <div id="status" class="status"></div>
    </div>
    
    <script src="index.js"></script>
</body>
</html>
