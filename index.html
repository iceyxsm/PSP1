<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Layer Manager Pro</title>
    <style>
        body {
            margin: 0;
            padding: 16px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: 12px;
            background: var(--uxp-host-background-color);
            color: var(--uxp-host-text-color);
        }
        
        .header {
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--uxp-host-border-color);
        }
        
        .header h1 {
            margin: 0;
            font-size: 16px;
            font-weight: 600;
        }
        
        .section {
            margin-bottom: 20px;
        }
        
        .section-title {
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--uxp-host-text-color);
        }
        
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .btn {
            padding: 8px 12px;
            border: 1px solid var(--uxp-host-border-color);
            background: var(--uxp-host-button-background-color);
            color: var(--uxp-host-button-text-color);
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s ease;
        }
        
        .btn:hover {
            background: var(--uxp-host-button-background-color-hover);
        }
        
        .btn:active {
            transform: translateY(1px);
        }
        
        .btn-primary {
            background: #0066cc;
            color: white;
            border-color: #0066cc;
        }
        
        .btn-primary:hover {
            background: #0052a3;
        }
        
        .color-picker {
            width: 100%;
            height: 32px;
            border: 1px solid var(--uxp-host-border-color);
            border-radius: 4px;
            cursor: pointer;
        }
        
        .status {
            padding: 8px;
            margin-top: 10px;
            border-radius: 4px;
            font-size: 11px;
            text-align: center;
            display: none;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .progress {
            width: 100%;
            height: 4px;
            background: var(--uxp-host-border-color);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 10px;
            display: none;
        }
        
        .progress-bar {
            height: 100%;
            background: #0066cc;
            width: 0%;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Layer Manager Pro</h1>
    </div>
    
    <div class="section">
        <div class="section-title">Quick Actions</div>
        <div class="button-group">
            <button class="btn btn-primary" id="oneClickGroup">
                🗂️ One-Click Group
            </button>
            <button class="btn" id="autoGroup">
                🤖 Smart Auto-Group
            </button>
        </div>
    </div>
    
    <div class="section">
        <div class="section-title">Bulk Styling</div>
        <div class="button-group">
            <div style="display: flex; gap: 8px; align-items: center;">
                <input type="color" class="color-picker" id="textColor" value="#000000">
                <button class="btn" id="bulkColorText" style="flex: 1;">
                    📝 Text Color
                </button>
            </div>
            <div style="display: flex; gap: 8px; align-items: center;">
                <input type="color" class="color-picker" id="shapeColor" value="#000000">
                <button class="btn" id="bulkColorShapes" style="flex: 1;">
                    🎨 Shape Color
                </button>
            </div>
            <button class="btn" id="bulkFont">
                🔤 Change Font
            </button>
            <button class="btn" id="autoOutline">
                ⭕ Auto Outline
            </button>
        </div>
    </div>
    
    <div class="section">
        <div class="section-title">Group Management</div>
        <div class="button-group">
            <button class="btn" id="toggleVisibility">
                👁️ Toggle Visibility
            </button>
            <button class="btn" id="renameGroup">
                ✏️ Smart Rename
            </button>
            <button class="btn" id="batchVisibility">
                👁️‍🗨️ Batch Visibility
            </button>
        </div>
    </div>
    
    <div class="section">
        <div class="section-title">Image Tools</div>
        <div class="button-group">
            <button class="btn" id="imageReplace">
                🖼️ Replace Image
            </button>
        </div>
    </div>
    
    <div class="progress" id="progress">
        <div class="progress-bar" id="progressBar"></div>
    </div>
    
    <div class="status" id="status"></div>
    
    <script src="index.js"></script>
</body>
</html>
