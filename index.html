<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>PSP1 - Layer Manager Pro</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="header">
        <h1>PSP1 - Layer Manager Pro</h1>
    </div>
    
    <!-- Layer Selection Section -->
    <div class="section">
        <div class="section-header">
            <div class="section-title">Select Layers</div>
            <button class="btn btn-small" id="refreshLayers">Refresh</button>
        </div>
        <div class="section-content">
            <div class="layer-list" id="layerList">
                <div class="help-text">Click Refresh to load layers</div>
            </div>
            <div class="button-row" style="margin-top: 12px;">
                <button class="btn" id="selectAll" style="flex: 1;">Select All</button>
                <button class="btn" id="deselectAll" style="flex: 1;">Deselect All</button>
            </div>
        </div>
    </div>
    
    <!-- Group Actions -->
    <div class="section">
        <div class="section-header">
            <div class="section-title">Group Actions</div>
        </div>
        <div class="section-content">
            <div class="input-group">
                <label class="input-label">Group Name (optional)</label>
                <input type="text" class="input-field" id="groupNameInput" placeholder="Auto-generate if empty" />
            </div>
            <button class="btn btn-primary" id="createGroup">Create Group</button>
            <button class="btn" id="smartAutoGroup">Smart Auto-Group</button>
        </div>
    </div>
    
    <!-- Bulk Styling -->
    <div class="section">
        <div class="section-header">
            <div class="section-title">Bulk Styling</div>
        </div>
        <div class="section-content">
            <div class="button-group">
                <div class="input-group">
                    <label class="input-label">Text Color</label>
                    <div class="button-row">
                        <input type="color" class="color-picker" id="textColor" value="#000000">
                        <button class="btn" id="applyTextColor" style="flex: 1;">Apply to Selected</button>
                    </div>
                </div>
                
                <div class="input-group">
                    <label class="input-label">Shape Color</label>
                    <div class="button-row">
                        <input type="color" class="color-picker" id="shapeColor" value="#000000">
                        <button class="btn" id="applyShapeColor" style="flex: 1;">Apply to Selected</button>
                    </div>
                </div>
                
                <div class="input-group">
                    <label class="input-label">Font</label>
                    <select class="select-field" id="fontSelect">
                        <option value="">Select Font...</option>
                    </select>
                    <button class="btn" id="applyFont">Apply Font</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Group Management -->
    <div class="section">
        <div class="section-header">
            <div class="section-title">Group Management</div>
        </div>
        <div class="section-content">
            <div class="button-group">
                <button class="btn" id="toggleVisibility">Toggle Visibility</button>
                <div class="button-row">
                    <button class="btn" id="showAll" style="flex: 1;">Show All</button>
                    <button class="btn" id="hideAll" style="flex: 1;">Hide All</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Image Tools -->
    <div class="section">
        <div class="section-header">
            <div class="section-title">Image Tools</div>
        </div>
        <div class="section-content">
            <button class="btn" id="replaceImage">Replace Image</button>
        </div>
    </div>
    
    <!-- Progress and Status -->
    <div class="progress" id="progress">
        <div class="progress-bar" id="progressBar"></div>
    </div>
    
    <div class="status" id="status"></div>
    
    <script src="index.js"></script>
</body>
</html>
